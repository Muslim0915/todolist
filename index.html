<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
          name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>TodoList</title>
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>

<div id="modal" class="modal">
    <div class="modal__container">
        <div class="modal-head">
            <div class="modal-head__title">Задача на сегодня <span class="create">[Создание]</span></div>
            <button class="modal-close__btn" ></button>

        </div>

        <form action="#">
            <div class="form-control">
                <label for="input__text">Название</label>
                <input type="text" class="input creating" id="input__text" placeholder="Введите текст">
            </div>
            <div class="form-control">
                <button class="delete__button" id="delete__button">Удалить</button>
                <button id="save__button">Сохранить</button>
            </div>
        </form>

    </div>
</div>

<header class="header">
    <div class="container">
        <a class="logo" href="index.html">
            <img
                    alt="logo"
                    height="15"
                    src="assets/images/svg/logo.svg"
                    width="62"
            />
        </a>
        <button class="modal-open__btn" type="button">Создать</button>
    </div>
</header>
<section class="section__todo-list container">
    <h1 class="title">Список задач</h1>
    <div class="todo__list">

    </div>
</section>
<script src="js/index.js"></script>
</body>
</html>
